<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title> Calculadora Inteligente </title>
</head>
<body>
    <main>
        <div class="areaCalculadora">
            <h1> Calculadora </h1>
            <div class="inputDeNumero">
                <input type="text" id="num1" placeholder="Primeiro Número">
                <input type="text" id="num2" placeholder="Segundo Número">
            </div>
            <button id="btnSomar" class="operacao">Somar</button>
            <button id="btnSubtrair" class="operacao">Subtrair</button>
            <button id="btnMultiplicar" class="operacao">Multiplicar</button>
            <button id="btnDividir" class="operacao">Dividir</button>


            <!--TODO: outros operaçãoes-->
            <div class="areaResultado">
                <p id="resultado">Resultado:</p>
            </div>
            <button id="btnLimpar" class="styleBtnLimpar">Limpar</button>
        
        
        </div>


    </main>
    <script src="script.js"></script>
    
</body>
</html>
